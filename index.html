<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lolamatón - Galleria Live</title>
    <script src="https://product-gallery.cloudinary.com/all.js" type="text/javascript"></script>
    
    <style>
        body {
            margin: 0; padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background-color: #fcf8f2;
            color: #4a4a4a; text-align: center;
        }
        h1 { font-weight: 300; color: #b89550; margin-bottom: 10px; }
        #my-gallery {
            width: 100%; max-width: 900px;
            margin: 20px auto;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .tag-info { font-style: italic; color: #b89550; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>✨ Lolamatón - Galeria Live ✨</h1>
    <div id="event-display" class="tag-info"></div>
    
    <div id="my-gallery"></div>

    <script type="text/javascript">
        const CLOUD_NAME = "dosy39ayg"; // Il tuo Cloud Name confermato
        
        const urlParams = new URLSearchParams(window.location.search);
        const eventTag = urlParams.get('tag') || "Comunion_Lola_2026";
        document.getElementById('event-display').innerText = "Evento: " + eventTag;

        const myGallery = cloudinary.galleryWidget({
            container: "#my-gallery",
            cloudName: CLOUD_NAME,
            mediaAssets: [{
                tag: eventTag,
                mediaType: "image"
            }],
            // --- CONFIGURAZIONE LOOP AUTOMATICO ---
            //displayProps: {
            //    mode: "classic", // Manteniamo classic per avere le miniature sotto
            //    columns: 1,      // Una foto grande alla volta per il loop
            //    aspectRatio: "1:1"
            //},
            // --- NUOVA CONFIGURAZIONE AUTOPLAY GARANTITA ---
            //autoplayProps: {
            //    active: true,         // SOSTITUITO: autoplay -> autoplayProps.active
            //    interval: 3000,      // SOSTITUITO: autoplayInterval -> autoplayProps.interval
            //    stopOnHover: false   // Il carosello NON si ferma se passi il mouse
            //},
            transition: "fade",       
            //infinite: true, // Ricomincia il giro dopo l'ultima foto
            carouselStyle: "thumbnails",
            loop: true,
            // --------------------------------------
            zoomProps: { type: "popup" },
            navigation: "always",
            thumbnails: true,
            styles: {
                palette: {
                    primary: "#b89550",
                    active: "#8c6d31"
                }
            }
        });

        myGallery.render();

        // REFRESH PAGINA: Ogni 60 secondi controlla se ci sono nuove foto caricate dal BMAX
        setTimeout(function(){
           location.reload();
        }, 60000); 
    </script>
</body>
</html>
