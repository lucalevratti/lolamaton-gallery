<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lolamatón - Galleria Live</title>
    
    <script src="https://product-gallery.cloudinary.com/all.js" type="text/javascript"></script>
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcf8f2; /* Un colore crema delicato per la Comunione */
            color: #4a4a4a;
            text-align: center;
        }
        h1 { font-weight: 300; color: #b89550; }
        #my-gallery {
            width: 100%;
            max-width: 900px;
            margin: 20px auto;
            border: 1px solid #e0d0b0;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .footer { margin-top: 20px; font-size: 0.8em; color: #999; }
    </style>
</head>
<body>

    <h1>✨ Lolamatón - Ricordi di Lola ✨</h1>
    
    <div id="my-gallery"></div>

    <div class="footer">
        Mi primera Comunión
    </div>

    <script type="text/javascript">
        // 1. CONFIGURAZIONE: Inserisci il tuo Cloud Name qui sotto
        const CLOUD_NAME = "dosy39ayg"; 

        // 2. LOGICA TAG: Recupera il tag dall'URL (?tag=nome_evento) 
        // Se non c'è nulla, usa quello di Lola come default
        const urlParams = new URLSearchParams(window.location.search);
        const eventTag = urlParams.get('tag') || "Comunion_Lola_2026";

        // 3. INIZIALIZZAZIONE WIDGET
        const myGallery = cloudinary.galleryWidget({
            container: "#my-gallery",
            cloudName: CLOUD_NAME,
            mediaAssets: [{
                tag: eventTag,
                mediaType: "image"
            }],
            displayProps: {
                mode: "classic",
                columns: 2,
                aspectRatio: "1:1"
            },
            zoomProps: { type: "popup" },
            navigation: "thumbnails",
            styles: {
                palette: {
                    primary: "#b89550", // Oro per la Comunione
                    active: "#8c6d31"
                }
            }
        });

        myGallery.render();

        // 4. REFRESH AUTOMATICO (Ogni 30 secondi)
        // Ricarica la pagina per mostrare le nuove foto caricate dal BMAX
        setTimeout(function(){
           location.reload();
        }, 30000); 
    </script>
</body>
</html>
